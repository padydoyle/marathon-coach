<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Marathon Coach"/>
<title>Marathon Coach — Dublin 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;color:#e5e5e5;font-family:Georgia,serif;min-height:100vh;padding-bottom:80px;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{display:none;}
.hdr{background:#0d0d0d;border-bottom:1px solid #181818;padding:12px 16px 10px;position:sticky;top:0;z-index:30;}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.app-name{font-size:9px;letter-spacing:4px;color:#34d399;text-transform:uppercase;font-family:monospace;margin-bottom:2px;}
.app-title{font-size:19px;color:#fff;font-weight:normal;}
.days-num{font-size:36px;font-weight:900;color:#fff;font-family:monospace;line-height:1;text-align:right;}
.days-lbl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:2px;margin-top:1px;text-align:right;}
.prog-row{display:flex;justify-content:space-between;font-size:10px;font-family:monospace;color:#444;margin-bottom:3px;}
.bar-track{background:#ffffff0d;border-radius:99px;height:4px;overflow:hidden;}
.tabs{display:flex;background:#0d0d0d;border-bottom:1px solid #181818;position:sticky;top:60px;z-index:20;}
.tab{flex:1;padding:10px 2px 8px;background:none;border:none;border-bottom:2px solid transparent;color:#444;font-size:9px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;}
.tab.on{border-bottom-color:#34d399;color:#34d399;}
.wrap{max-width:680px;margin:0 auto;padding:0 14px;}
.card{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:13px 15px;margin-bottom:11px;}
.lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;font-family:monospace;color:#555;margin-bottom:7px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:9px;}
.sbox{background:#0a0a0a;border-radius:8px;padding:8px 9px;}
.slbl{font-size:9px;color:#444;font-family:monospace;margin-bottom:2px;}
.sval{font-size:13px;font-family:monospace;font-weight:bold;}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-family:monospace;}
.tick{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;border:2px solid #2a2a2a;background:transparent;color:#000;}
.fbtn{padding:2px 7px;border-radius:99px;font-size:10px;border:1px solid #1e1e1e;background:transparent;color:#444;}
.pbtn{width:100%;border:1px solid #181818;background:#0f0f0f;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;text-align:left;}
.pbtn.on{border-radius:12px 12px 0 0;}
.pbody{border:1px solid #1e1e1e;border-top:none;border-radius:0 0 12px 12px;background:#0c0c0c;overflow:hidden;}
.wbtn{width:100%;background:none;border:none;padding:9px 14px;display:flex;align-items:center;gap:8px;text-align:left;border-bottom:1px solid #181818;}
.rrow{display:flex;align-items:center;padding:8px 14px 8px 40px;gap:8px;border-top:1px solid #181818;}
.frow{display:flex;gap:5px;padding:0 14px 7px 70px;flex-wrap:wrap;align-items:center;}
.upzone{border:2px dashed #34d39930;border-radius:12px;padding:14px;text-align:center;cursor:pointer;background:#0a0a0a;}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:#000000dd;z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#111;border:1px solid #2a2a2a;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;}
.inp{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-size:14px;padding:9px 11px;font-family:monospace;outline:none;margin-bottom:7px;}
.err-box{background:#1a0505;border:1px solid #f43f5e40;border-radius:10px;padding:11px 13px;font-size:12px;color:#f43f5e;line-height:1.6;margin-top:8px;font-family:monospace;}
.warn{background:#1a1000;border:1px solid #f97316;border-radius:12px;padding:12px 15px;margin-bottom:11px;}
.day-btn{padding:4px 8px;border-radius:6px;font-size:11px;font-family:monospace;border:1px solid #2a2a2a;background:#0a0a0a;color:#666;cursor:pointer;transition:all .15s;}
.day-btn.conflict{border-color:#fb923c60;color:#fb923c;}
.day-btn.selected{border-color:#34d39960;color:#34d399;background:#34d39910;}
.skip-btn{padding:3px 8px;border-radius:6px;font-size:10px;font-family:monospace;border:1px solid #2a2a2a;background:transparent;color:#444;cursor:pointer;}
.skip-btn.skipped{border-color:#555;color:#555;text-decoration:line-through;}
@media(max-width:380px){.days-num{font-size:28px;}.g2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
var RD = new Date("2026-10-25T09:00:00");
var SHOE_WARN = 600;
var DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var TC = {Easy:"#34d399",Recovery:"#34d399",Long:"#60a5fa",Tempo:"#f43f5e",Race:"#fb923c"};
var FO = [{label:"Easy",c:"#34d399",i:"&#128524;"},{label:"Hard",c:"#fb923c",i:"&#128548;"},{label:"Struggled",c:"#f43f5e",i:"&#128565;"}];
var UTYPES = [
  {key:"scale",    label:"Scale", emoji:"&#9878;&#65039;", color:"#34d399"},
  {key:"nutrition",label:"Food",  emoji:"&#127869;&#65039;", color:"#fb923c"},
  {key:"sleep",    label:"Sleep", emoji:"&#128564;", color:"#a78bfa"},
  {key:"run",      label:"Run",   emoji:"&#127939;", color:"#60a5fa", runOnly:true}
];
var RACE_LIST = [
  {label:"5K Parkrun",     week:"Wk 4-6",   target:"Experience only"},
  {label:"10K Race",       week:"Wk 9-10",  target:"Target ~56:50"},
  {label:"Half Marathon",  week:"Wk 15-16", target:"Target 1:52-1:55"},
  {label:"Dublin Marathon",week:"Oct 25",   target:"Sub 4:00:00"}
];

// ── PLAN DATA ─────────────────────────────────────────────────────────────────
var phases = [
  {name:"Base Building",weeks:"1-6",color:"#34d399",bg:"#022c22",goal:"Build the habit. Protect your joints. Slow is right.",ws:[
    {label:"Week 1",km:14,cb:false,runs:[{day:"Tue",type:"Easy",det:"20 min easy run/walk"},{day:"Thu",type:"Easy",det:"20 min easy run/walk"},{day:"Sat",type:"Long",det:"5K easy - walk breaks fine"}]},
    {label:"Week 2",km:17,cb:false,runs:[{day:"Tue",type:"Easy",det:"25 min easy"},{day:"Thu",type:"Easy",det:"25 min easy"},{day:"Sat",type:"Long",det:"6K easy"}]},
    {label:"Week 3",km:20,cb:false,runs:[{day:"Tue",type:"Easy",det:"30 min easy"},{day:"Thu",type:"Easy",det:"30 min easy"},{day:"Sat",type:"Long",det:"7K easy"}]},
    {label:"Week 4",km:16,cb:true, runs:[{day:"Tue",type:"Easy",det:"25 min easy"},{day:"Thu",type:"Easy",det:"25 min easy"},{day:"Sat",type:"Long",det:"6K easy - cutback"}]},
    {label:"Week 5",km:24,cb:false,runs:[{day:"Tue",type:"Easy",det:"35 min easy"},{day:"Thu",type:"Easy",det:"30 min easy"},{day:"Sat",type:"Long",det:"9K easy"}]},
    {label:"Week 6",km:18,cb:true, runs:[{day:"Tue",type:"Easy",det:"30 min easy"},{day:"Thu",type:"Easy",det:"25 min easy"},{day:"Sat",type:"Long",det:"8K easy - cutback"}]}
  ]},
  {name:"Development",weeks:"7-13",color:"#60a5fa",bg:"#0c1a2e",goal:"Build your engine. Tempo runs begin. Long runs grow.",ws:[
    {label:"Week 7", km:35,cb:false,runs:[{day:"Tue",type:"Tempo",det:"5K tempo (5:15/km)"},{day:"Thu",type:"Easy",det:"6K easy"},{day:"Sat",type:"Long",det:"12K easy"}]},
    {label:"Week 8", km:38,cb:false,runs:[{day:"Tue",type:"Tempo",det:"6K tempo"},{day:"Thu",type:"Easy",det:"7K easy"},{day:"Sat",type:"Long",det:"14K easy"}]},
    {label:"Week 9", km:42,cb:false,runs:[{day:"Tue",type:"Tempo",det:"6K tempo"},{day:"Thu",type:"Easy",det:"8K easy"},{day:"Sun",type:"Recovery",det:"5K recovery"},{day:"Sat",type:"Long",det:"16K easy"}]},
    {label:"Week 10",km:30,cb:true, runs:[{day:"Tue",type:"Easy",det:"6K easy"},{day:"Thu",type:"Easy",det:"6K easy"},{day:"Sat",type:"Long",det:"12K OR 10K race"}]},
    {label:"Week 11",km:45,cb:false,runs:[{day:"Tue",type:"Tempo",det:"7K tempo"},{day:"Thu",type:"Easy",det:"8K easy"},{day:"Sun",type:"Recovery",det:"5K recovery"},{day:"Sat",type:"Long",det:"18K easy"}]},
    {label:"Week 12",km:48,cb:false,runs:[{day:"Tue",type:"Tempo",det:"8K tempo"},{day:"Thu",type:"Easy",det:"8K easy"},{day:"Sun",type:"Recovery",det:"6K recovery"},{day:"Sat",type:"Long",det:"20K easy"}]},
    {label:"Week 13",km:36,cb:true, runs:[{day:"Tue",type:"Easy",det:"6K easy"},{day:"Thu",type:"Easy",det:"6K easy"},{day:"Sat",type:"Long",det:"14K easy"}]}
  ]},
  {name:"Peak Training",weeks:"14-19",color:"#fb923c",bg:"#1c0a00",goal:"Peak mileage. Race pace work. Longest runs 32-34K.",ws:[
    {label:"Week 14",km:55,cb:false,runs:[{day:"Tue",type:"Tempo",det:"8K tempo (5:10/km)"},{day:"Thu",type:"Easy",det:"10K easy"},{day:"Sun",type:"Recovery",det:"6K easy"},{day:"Sat",type:"Long",det:"24K - last 5K at pace"}]},
    {label:"Week 15",km:60,cb:false,runs:[{day:"Tue",type:"Tempo",det:"8K tempo"},{day:"Thu",type:"Easy",det:"10K easy"},{day:"Sun",type:"Recovery",det:"6K easy"},{day:"Sat",type:"Long",det:"27K OR Half Marathon"}]},
    {label:"Week 16",km:65,cb:false,runs:[{day:"Tue",type:"Tempo",det:"10K tempo"},{day:"Thu",type:"Easy",det:"12K easy"},{day:"Sun",type:"Recovery",det:"6K easy"},{day:"Sat",type:"Long",det:"30K - mid 10K at pace"}]},
    {label:"Week 17",km:48,cb:true, runs:[{day:"Tue",type:"Easy",det:"8K easy"},{day:"Thu",type:"Easy",det:"8K easy"},{day:"Sat",type:"Long",det:"20K easy"}]},
    {label:"Week 18",km:68,cb:false,runs:[{day:"Tue",type:"Tempo",det:"10K tempo"},{day:"Thu",type:"Easy",det:"12K easy"},{day:"Sun",type:"Recovery",det:"8K easy"},{day:"Sat",type:"Long",det:"34K - peak long run"}]},
    {label:"Week 19",km:55,cb:true, runs:[{day:"Tue",type:"Easy",det:"8K easy"},{day:"Thu",type:"Easy",det:"8K easy"},{day:"Sat",type:"Long",det:"22K easy"}]}
  ]},
  {name:"Taper",weeks:"20-23",color:"#c084fc",bg:"#150a2a",goal:"Trust your training. Rest is the work now.",ws:[
    {label:"Week 20",  km:48,cb:false,runs:[{day:"Tue",type:"Tempo",det:"6K race-pace strides"},{day:"Thu",type:"Easy",det:"8K easy"},{day:"Sat",type:"Long",det:"26K easy"}]},
    {label:"Week 21",  km:36,cb:false,runs:[{day:"Tue",type:"Tempo",det:"5K with strides"},{day:"Thu",type:"Easy",det:"6K easy"},{day:"Sat",type:"Long",det:"18K easy"}]},
    {label:"Week 22",  km:24,cb:false,runs:[{day:"Tue",type:"Easy",det:"5K + 4 strides"},{day:"Thu",type:"Easy",det:"5K easy"},{day:"Sat",type:"Long",det:"12K easy"}]},
    {label:"Race Week",km:5, cb:false,rw:true,runs:[{day:"Mon",type:"Easy",det:"4K very easy"},{day:"Wed",type:"Easy",det:"4K + 2 strides"},{day:"Sat",type:"Easy",det:"10 min shakeout"},{day:"Sun",type:"Race",det:"Dublin Marathon!"}]}
  ]}
];
var PACES = [
  {l:"Easy / Recovery",p:"6:30-7:00",f:"Full conversation. Nose breathing.",c:"#34d399"},
  {l:"Long Run",       p:"6:00-6:30",f:"Controlled. Full sentences.",       c:"#60a5fa"},
  {l:"Marathon Pace",  p:"5:41",      f:"Comfortably hard. Focused.",        c:"#fb923c"},
  {l:"Tempo",          p:"5:00-5:15", f:"Hard. 3-4 words at a time.",        c:"#f43f5e"}
];

// Build all keys
var AK = [];
phases.forEach(function(p,pi){p.ws.forEach(function(w,wi){w.runs.forEach(function(_,ri){AK.push("p"+pi+"w"+wi+"r"+ri);});});});

// ── STATE ─────────────────────────────────────────────────────────────────────
var S = {
  tab:"today",comp:{},feels:{},skipped:{},customDays:{},
  bodyLog:[],nutLog:[],runLog:[],recLog:[],
  races:[{result:""},{result:""},{result:""},{result:""}],
  shoeKm:0,shoeDate:"",
  ep:0,ew:null,showSettings:false,showShoe:false,showManual:false,manualType:"scale",showExport:false,missedNote:"",
  remind:false,lastRemind:0,
  coachNote:"",coachDate:"",coachVerdict:"on track",coachFocus:"",
  apiKey:"",todayUploads:{},
  uSt:"idle",uSrc:null,uType:null,uData:null,uErr:null,
  uMK:null,uMR:null,uTicked:false,
  confirmMove:null  // {key, newDay} pending confirm
};

function load(){
  try{var d=localStorage.getItem("mc1");if(d){var p=JSON.parse(d);Object.assign(S,p);}}catch(e){}
  S.uSt="idle";S.uSrc=null;S.uType=null;S.uData=null;S.uErr=null;
  S.uMK=null;S.uMR=null;S.uTicked=false;S.confirmMove=null;
}
function persist(){
  try{
    var save=Object.assign({},S);
    delete save.uSt;delete save.uSrc;delete save.uType;delete save.uData;
    delete save.uErr;delete save.uMK;delete save.uMR;delete save.uTicked;delete save.confirmMove;delete save.showManual;delete save.showExport;
    localStorage.setItem("mc1",JSON.stringify(save));
  }catch(e){}
}
function set(patch){Object.assign(S,patch);persist();render();}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function toStr(){return new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short"});}
function dLeft(){return Math.max(0,Math.floor((RD-Date.now())/86400000));}
function latB(f){var e=[].concat(S.bodyLog).reverse().find(function(x){return x[f]!=null;});return e?e[f]:null;}
function latR(f){var e=[].concat(S.recLog).reverse().find(function(x){return x[f]!=null;});return e?e[f]:null;}
function done(){return AK.filter(function(k){return S.comp[k];}).length;}
function getDay(key){return S.customDays[key]||defaultDay(key);}
function defaultDay(key){
  var parts=key.match(/p(\d+)w(\d+)r(\d+)/);
  if(!parts)return"";
  var pi=parseInt(parts[1]),wi=parseInt(parts[2]),ri=parseInt(parts[3]);
  try{return phases[pi].ws[wi].runs[ri].day;}catch(e){return"";}
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setTab(t){set({tab:t});}
function toggleSettings(){set({showSettings:!S.showSettings});}
function dismissRemind(){set({remind:false,lastRemind:done()});}
function togglePhase(pi){set({ep:S.ep===pi?null:pi,ew:null});}
function toggleWeek(wid){set({ew:S.ew===wid?null:wid});}
function clearUpload(){S.uSt="idle";S.uSrc=null;S.uType=null;S.uData=null;S.uErr=null;S.uMK=null;S.uMR=null;S.uTicked=false;render();}

function manualTick(key){
  var c=Object.assign({},S.comp),f=Object.assign({},S.feels);
  if(c[key]){delete c[key];delete f[key];}else{c[key]=true;}
  var d=Object.keys(c).filter(function(k){return c[k];}).length;
  set({comp:c,feels:f,remind:d>0&&d%3===0&&d>S.lastRemind});
}
function setFeel(key,feel){var f=Object.assign({},S.feels);f[key]=feel;set({feels:f});}
function tickFromUpload(){if(!S.uMK)return;var c=Object.assign({},S.comp);c[S.uMK]=true;S.uTicked=true;set({comp:c});}

function skipRun(key){
  var sk=Object.assign({},S.skipped);
  var note="";
  if(sk[key]){delete sk[key];}
  else{
    sk[key]=true;
    note="Skipped run logged. Do not cram missed mileage into the next day. If it was easy/recovery, move on. If it was long, reschedule only if you can keep an easy day either side. If tired or sore, take the recovery win.";
  }
  set({skipped:sk,missedNote:note});
}

// Move run day with conflict detection
function attemptMoveDay(key,newDay){
  // Find what other runs are in the same week
  var parts=key.match(/p(\d+)w(\d+)r(\d+)/);
  if(!parts)return;
  var pi=parseInt(parts[1]),wi=parseInt(parts[2]);
  var week=phases[pi].ws[wi];
  var conflict=false;
  week.runs.forEach(function(_,ri){
    var otherKey="p"+pi+"w"+wi+"r"+ri;
    if(otherKey===key)return;
    if(getDay(otherKey)===newDay)conflict=true;
  });
  if(conflict){
    set({confirmMove:{key:key,newDay:newDay}});
  }else{
    var cd=Object.assign({},S.customDays);
    cd[key]=newDay;
    set({customDays:cd,confirmMove:null});
  }
}
function confirmMoveDay(){
  if(!S.confirmMove)return;
  var cd=Object.assign({},S.customDays);
  cd[S.confirmMove.key]=S.confirmMove.newDay;
  set({customDays:cd,confirmMove:null});
}
function cancelMove(){set({confirmMove:null});}
function cycleDay(key){
  var current=getDay(key);
  var idx=DAYS.indexOf(current);
  var next=DAYS[(idx+1)%DAYS.length];
  attemptMoveDay(key,next);
}

function logRace(i){
  var v=(document.getElementById("ri"+i)||{}).value||"";
  var races=S.races.map(function(r,j){return j===i?{result:v}:r;});
  set({races:races});
}
function saveKey(){
  var v=((document.getElementById("sk")||{}).value||"").trim();
  if(v.indexOf("sk-")===0){set({apiKey:v,showSettings:false});}
  else{alert("Please enter a valid Anthropic key starting with sk-");}
}
function clearKey(){
  if(confirm("Clear the saved Anthropic API key from this device?")){
    set({apiKey:""});
  }
}
function saveCoach(){
  set({
    coachNote:(document.getElementById("cn")||{}).value||"",
    coachFocus:(document.getElementById("cf")||{}).value||"",
    coachVerdict:(document.getElementById("cv")||{}).value||"on track",
    coachDate:toStr(),showSettings:false
  });
}
function saveShoe(){
  set({shoeKm:parseFloat((document.getElementById("shkm")||{}).value)||0,shoeDate:(document.getElementById("shdt")||{}).value||"",showShoe:false});
}

function openManual(type){set({showManual:true,manualType:type||"scale"});}
function closeManual(){set({showManual:false});}
function nval(id){var v=(document.getElementById(id)||{}).value;var n=parseFloat(v);return isNaN(n)?null:n;}
function sval(id){return ((document.getElementById(id)||{}).value||"").trim();}
function saveManual(){
  var t=S.manualType||"scale", today=toStr();
  if(t==="scale"){
    var e={date:today};
    [["weight","mw"],["bodyFat","mbf"],["visceralFat","mvf"],["bodyWater","mbw"],["skeletalMuscle","msm"],["muscleMass","mmm"]].forEach(function(x){var v=nval(x[1]);if(v!=null)e[x[0]]=v;});
    if(Object.keys(e).length>1){S.bodyLog=S.bodyLog.concat([e]);markUploaded("scale");}
  }else if(t==="nutrition"){
    var ne={date:today};
    [["calories","mcal"],["protein","mpro"],["carbs","mcarb"],["fat","mfat"]].forEach(function(x){var v=nval(x[1]);if(v!=null)ne[x[0]]=v;});
    if(Object.keys(ne).length>1){S.nutLog=S.nutLog.concat([ne]);markUploaded("nutrition");}
  }else if(t==="sleep"){
    var re={date:today,type:"sleep"};
    [["totalHours","mhrs"],["restingHR","mrhr"],["avgHRV","mhrv"],["bodyBatteryChange","mbb"],["avgSpO2","mspo"],["lowestSpO2","mlspo"],["restlessMoments","mrest"]].forEach(function(x){var v=nval(x[1]);if(v!=null)re[x[0]]=v;});
    var st=sval("mst"),en=sval("men"),hs=sval("mhrvs"); if(st)re.sleepStart=st;if(en)re.sleepEnd=en;if(hs)re.weekHRVstatus=hs;
    if(Object.keys(re).length>2){S.recLog=S.recLog.concat([re]);markUploaded("sleep");}
  }else if(t==="run"){
    var dist=nval("mrd"), hr=nval("mrhrun"), cal=nval("mrcal");
    var rt=sval("mrtype")||"Easy";
    var rr={date:today,distance:dist?dist+"km":"",distanceKm:dist,time:sval("mrtime"),pace:sval("mrpace"),hr:hr,calories:cal,runType:rt,verdict:"manual",assessment:"Manual run entry",tip:"Keep the next session aligned to the plan."};
    S.runLog=S.runLog.concat([rr]);
    if(dist)S.shoeKm=Math.round((S.shoeKm+dist)*10)/10;
    var m=findMatch(rt); if(m){S.comp[m.key]=true;S.uMK=m.key;S.uMR=m;S.uTicked=true;}
    markUploaded("run");
  }
  S.showManual=false;persist();render();
}
function avg(arr){return arr.length?Math.round((arr.reduce(function(a,b){return a+b;},0)/arr.length)*10)/10:null;}
function weeklyReview(){
  var wk=thisWeek(); if(!wk)return null;
  var sleepVals=S.recLog.slice(-7).map(function(r){return parseFloat(r.totalHours);}).filter(function(v){return !isNaN(v);});
  var protVals=S.nutLog.slice(-7).map(function(n){return parseFloat(n.protein);}).filter(function(v){return !isNaN(v);});
  var calVals=S.nutLog.slice(-7).map(function(n){return parseFloat(n.calories);}).filter(function(v){return !isNaN(v);});
  var weights=S.bodyLog.slice(-7).map(function(b){return parseFloat(b.weight);}).filter(function(v){return !isNaN(v);});
  var wDelta=weights.length>=2?Math.round((weights[weights.length-1]-weights[0])*10)/10:null;
  var score=0; if(wk.done>=Math.max(1,wk.total-1))score++; if(!wk.skipped)score++; if(avg(sleepVals)==null||avg(sleepVals)>=6.5)score++; if(avg(protVals)==null||avg(protVals)>=170)score++;
  var verdict=score>=3?"Green":score===2?"Amber":"Red";
  var col=verdict==="Green"?"#34d399":verdict==="Amber"?"#fb923c":"#f43f5e";
  var advice=verdict==="Green"?"Good week. Keep stacking boring, consistent days.":verdict==="Amber"?"Mostly fine, but do not let recovery or missed runs drift.":"Back off and stabilise. The goal is consistency, not panic mileage.";
  return {wk:wk,sleep:avg(sleepVals),protein:avg(protVals),calories:avg(calVals),wDelta:wDelta,verdict:verdict,col:col,advice:advice};
}
function coachSummary(){
  var wr=weeklyReview(), wk=wr?wr.wk:thisWeek();
  var lines=[];
  lines.push("Marathon Coach Check-in - "+toStr());
  lines.push("Days to Dublin: "+dLeft());
  if(wk){lines.push("Week: "+wk.week.label+" ("+wk.phase.name+")");lines.push("Runs: "+wk.done+"/"+wk.total+(wk.skipped?"; skipped "+wk.skipped:""));lines.push("Logged distance this week: "+wk.km.toFixed(1)+"km");if(wk.avgHR)lines.push("Avg run HR: "+wk.avgHR+"bpm");}
  var lw=latB("weight"), bf=latB("bodyFat"), rhr=latR("restingHR"), hrv=latR("avgHRV");
  if(lw)lines.push("Weight: "+lw+"kg"+(bf?"; body fat "+bf+"%":""));
  if(rhr||hrv)lines.push("Recovery: RHR "+(rhr||"n/a")+"; HRV "+(hrv||"n/a"));
  if(wr){lines.push("Weekly verdict: "+wr.verdict+" - "+wr.advice); if(wr.sleep)lines.push("Avg sleep: "+wr.sleep+"h"); if(wr.protein)lines.push("Avg protein: "+wr.protein+"g"); if(wr.wDelta!==null)lines.push("Weight trend: "+(wr.wDelta>0?"+":"")+wr.wDelta+"kg");}
  if(S.runLog.length){var r=S.runLog[S.runLog.length-1];lines.push("Latest run: "+(r.distance||"")+" "+(r.pace||"")+" HR "+(r.hr||"n/a"));}

}

function findMatch(type){
  for(var pi=0;pi<phases.length;pi++){for(var wi=0;wi<phases[pi].ws.length;wi++){
    var w=phases[pi].ws[wi];
    for(var ri=0;ri<w.runs.length;ri++){
      var key="p"+pi+"w"+wi+"r"+ri;
      if(S.comp[key]||S.skipped[key])continue;
      var run=w.runs[ri];
      if(run.type===type||(type==="Easy"&&run.type==="Recovery")||(type==="Recovery"&&run.type==="Easy"))
        return{key:key,run:run,week:w,phase:phases[pi]};

  }}return null;
}

function overtrain(){
  var alerts=[];
  var rec=[].concat(S.recLog).slice(-3);
  var hrs=rec.filter(function(r){return r.restingHR;}).map(function(r){return r.restingHR;});
  var hrvs=rec.filter(function(r){return r.avgHRV;}).map(function(r){return r.avgHRV;});
  var slps=rec.filter(function(r){return r.totalHours;}).map(function(r){return r.totalHours;});
  if(hrs.length>=2&&hrs.every(function(h){return h>74;}))alerts.push("Resting HR elevated ("+hrs[hrs.length-1]+"bpm) for "+hrs.length+"+ days - rest day recommended");
  if(hrvs.length>=2&&hrvs.every(function(h){return h<30;}))alerts.push("HRV low ("+hrvs[hrvs.length-1]+"ms) - recovery before next hard session");
  if(slps.length>=2&&slps.every(function(s){return s<5.5;}))alerts.push("Sleep under 5.5hrs for "+slps.length+"+ nights - training adaptation is suffering");
  return alerts.length?alerts:null;
}

function thisWeek(){
  for(var pi=0;pi<phases.length;pi++){for(var wi=0;wi<phases[pi].ws.length;wi++){
    var w=phases[pi].ws[wi];
    var keys=w.runs.map(function(_,ri){return "p"+pi+"w"+wi+"r"+ri;});
    if(keys.some(function(k){return S.comp[k];})|| keys.some(function(k){return !S.comp[k]&&!S.skipped[k];})){
      var doneCt=keys.filter(function(k){return S.comp[k];}).length;
      var skipCt=keys.filter(function(k){return S.skipped[k];}).length;
      var recent=S.runLog.slice(-doneCt);
      var km=recent.reduce(function(a,r){var v=parseFloat(r.distanceKm||0);return a+(isNaN(v)?0:v);},0);
      var hrruns=recent.filter(function(r){return r.hr;});
      var avgHR=hrruns.length?Math.round(hrruns.reduce(function(a,r){return a+r.hr;},0)/hrruns.length):null;
      // Feel dots for completed runs
      var feelDots=keys.map(function(k){
        if(!S.comp[k])return null;
        return S.feels[k]||"done";
      }).filter(function(x){return x!==null;});
      return{week:w,phase:phases[pi],keys:keys,done:doneCt,skipped:skipCt,total:keys.length,km:km,avgHR:avgHR,feelDots:feelDots};
    }
  }}return null;
}

function analyseImage(b64,mime,cb){
  var sys="You are analysing a Garmin or nutrition app screenshot for Paddy, training for Dublin Marathon 2026 (sub-4:00, 5:41/km). He is 6ft2, ~114kg. Recovery baselines: restingHR 69bpm, HRV 39ms.\n\nIdentify the screenshot type and extract all visible numbers.\n\nTYPE 1 - GARMIN RUN (black bg, Running header, map, Distance/Heart Rate/Pace/Time/Calories):\nrunType: pace faster than 5:30/km = Tempo, distance over 10km = Long, else = Easy.\n\nTYPE 2 - SMART SCALE (white/light bg, Paddy at top, list of metrics):\nExtract Weight kg, Body Fat%, Visceral Fat, Body Water%, Skeletal Muscle%, Muscle Mass kg.\n\nTYPE 3 - NUTRITION APP (dark bg, big Calories, then Carbs/Fat/Protein with targets).\n\nTYPE 4 - GARMIN SLEEP (black bg, Sleep header, sleep chart, Sleep Metrics):\nExtract sleepStart, sleepEnd, totalHours, restlessMoments, avgOvernightHR, restingHR, bodyBatteryChange, avgSpO2, lowestSpO2, avgHRV, weekHRVstatus.\nNOTE: restingHR from sleep screen also serves as the daily resting heart rate - no separate HR screenshot needed.\n\nRespond ONLY with valid JSON, no markdown:\nRun: {\"type\":\"run\",\"data\":{\"distance\":\"3km\",\"distanceKm\":3.0,\"time\":\"24:00\",\"pace\":\"8:00/km\",\"hr\":147,\"calories\":299,\"runType\":\"Easy\",\"assessment\":\"coaching note 2-3 sentences\",\"verdict\":\"on track\",\"tip\":\"one tip\"}}\nScale: {\"type\":\"scale\",\"data\":{\"weight\":114.1,\"bodyFat\":33.2,\"visceralFat\":14.2,\"bodyWater\":47.9,\"skeletalMuscle\":45.9,\"muscleMass\":71.4,\"summary\":\"2 sentence summary vs baseline\",\"coachNote\":\"one recommendation\"}}\nNutrition: {\"type\":\"nutrition\",\"data\":{\"calories\":2293,\"carbs\":198,\"fat\":68,\"protein\":220,\"calTarget\":2220,\"carbTarget\":222,\"fatTarget\":62,\"proteinTarget\":194,\"summary\":\"2 sentences\",\"tip\":\"one tip\"}}\nSleep: {\"type\":\"sleep\",\"data\":{\"sleepStart\":\"00:08\",\"sleepEnd\":\"05:46\",\"totalHours\":5.6,\"restlessMoments\":35,\"avgOvernightHR\":84,\"restingHR\":69,\"bodyBatteryChange\":19,\"avgSpO2\":91,\"lowestSpO2\":76,\"avgHRV\":39,\"weekHRVstatus\":\"Balanced\",\"summary\":\"sleep quality coaching note\",\"alert\":\"concern or empty string\"}}";

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:900,system:sys,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:"Analyse this screenshot and return only the JSON."}]}]})
  }).then(function(resp){
    if(!resp.ok){return resp.json().then(function(e){throw new Error("API "+resp.status+": "+((e&&e.error&&e.error.message)||resp.statusText));});}
    return resp.json();
  }).then(function(data){
    if(data.error)throw new Error(data.error.message);
    var raw=(data.content||[]).map(function(b){return b.text||"";}).join("").trim();
    raw=raw.replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
    cb(null,JSON.parse(raw));
  }).catch(function(err){cb(err,null);});
}

function handleFile(file){
  if(!file)return;
  if(!S.apiKey){set({showSettings:true});return;}
  S.uSt="loading";S.uData=null;S.uErr=null;S.uTicked=false;S.uMK=null;S.uMR=null;
  render();
  var reader=new FileReader();
  reader.onload=function(ev){
    S.uSrc=ev.target.result;render();
    analyseImage(ev.target.result.split(",")[1],file.type||"image/jpeg",function(err,result){
      if(err){S.uSt="error";S.uErr=err.message;persist();render();return;}
      var today=toStr();
      S.uType=result.type;
      S.uData=result.data||{};
      var d=S.uData;
      if(result.type==="run"){
        S.runLog=S.runLog.concat([Object.assign({date:today},d)]);
        if(d.distanceKm)S.shoeKm=Math.round((S.shoeKm+parseFloat(d.distanceKm))*10)/10;
        var m=findMatch(d.runType||"Easy");
        if(m){S.uMK=m.key;S.uMR=m;S.comp[m.key]=true;S.uTicked=true;}
      }else if(result.type==="scale"){
        var se={date:today};
        ["weight","bodyFat","muscleMass","visceralFat","skeletalMuscle","bodyWater"].forEach(function(k){if(d[k]!=null)se[k]=d[k];});
        if(Object.keys(se).length>1)S.bodyLog=S.bodyLog.concat([se]);
      }else if(result.type==="nutrition"){
        var ne={date:today};
        ["calories","protein","carbs","fat"].forEach(function(k){if(d[k]!=null)ne[k]=d[k];});
        if(Object.keys(ne).length>1)S.nutLog=S.nutLog.concat([ne]);
      }else if(result.type==="sleep"){
        var re={date:today,type:"sleep"};
        ["sleepStart","sleepEnd","totalHours","restlessMoments","avgOvernightHR","restingHR","bodyBatteryChange","avgSpO2","lowestSpO2","avgHRV","weekHRVstatus"].forEach(function(k){if(d[k]!=null)re[k]=d[k];});
        if(Object.keys(re).length>2)S.recLog=S.recLog.concat([re]);
      }
      markUploaded(result.type);
      S.uSt="done";persist();render();
    });
  };
  reader.readAsDataURL(file);
}

// ── SVG / DISPLAY HELPERS ─────────────────────────────────────────────────────
function mkBar(v,mx,col,h){
  h=h||5;var p=Math.min(Math.round((v/mx)*100),100);
  return '<div class="bar-track" style="height:'+h+'px"><div style="height:100%;width:'+p+'%;background:'+col+';border-radius:99px;transition:width .5s"></div></div>';
}
function mkSpark(entries,field,col,unit){
  unit=unit||"";
  var vals=entries.map(function(e){return e[field];}).filter(function(v){return v!=null;});
  if(vals.length<2)return '<div style="font-size:11px;color:#333;font-style:italic">2+ entries needed</div>';
  var lo=Math.min.apply(null,vals)-0.5,hi=Math.max.apply(null,vals)+0.5;
  var W=240,H=38,P=4;
  var xs=vals.map(function(_,i){return P+(i/(vals.length-1))*(W-P*2);});
  var ys=vals.map(function(v){return P+(1-(v-lo)/(hi-lo))*(H-P*2);});
  var pts=xs.map(function(x,i){return x+","+ys[i];}).join(" ");
  var delta=(vals[vals.length-1]-vals[0]).toFixed(1);
  var downGood=["weight","bodyFat","visceralFat","restingHR"].indexOf(field)>=0;
  var good=downGood?parseFloat(delta)<=0:parseFloat(delta)>=0;
  return '<div><div style="display:flex;justify-content:space-between;font-size:10px;font-family:monospace;margin-bottom:2px"><span style="color:#444">'+vals[0]+unit+" to "+vals[vals.length-1]+unit+'</span><span style="color:'+(good?"#34d399":"#f43f5e")+'">'+(parseFloat(delta)>0?"+":"")+delta+unit+'</span></div><svg width="100%" viewBox="0 0 '+W+' '+H+'"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linejoin="round"/>'+xs.map(function(x,i){return '<circle cx="'+x+'" cy="'+ys[i]+'" r="2.5" fill="'+col+'"/>';}).join("")+'</svg></div>';
}
function mkArrow(log,field){
  var vals=log.slice(-3).map(function(e){return e[field];}).filter(function(v){return v!=null;});
  if(vals.length<2)return "";
  var d=vals[vals.length-1]-vals[0];
  var downGood=["weight","bodyFat","visceralFat","restingHR"].indexOf(field)>=0;
  var good=downGood?d<0:d>0;
  return '<span style="color:'+(good?"#34d399":"#f43f5e")+';font-size:13px;margin-left:4px">'+(d<0?"↓":d>0?"↑":"→")+'</span>';
}
function feelDot(feel){
  var map={Easy:"#34d399",Hard:"#fb923c",Struggled:"#f43f5e",done:"#333"};
  var c=map[feel]||"#333";
  return '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+c+';margin-right:3px"></span>';
}

function mkUpload(){

  var wk=thisWeek();

  var vc=S.coachVerdict==="on track"?"#34d399":S.coachVerdict==="ahead"?"#60a5fa":"#f43f5e";

    var runColor=TC[nextRun.run.type]||"#34d399";
    nextCard='<div class="card" style="border-color:'+runColor+'30;background:#0d0d0d;margin-bottom:11px">'

  }

    +'<div class="g2"><div class="card"><div class="lbl" style="color:#f43f5e">Resting HR</div>'+(lrhr?'<div style="font-size:21px;color:#f43f5e;font-family:monospace;font-weight:bold;line-height:1">'+lrhr+mkArrow(S.recLog,"restingHR")+'<span style="font-size:11px;color:#555"> bpm</span></div><div style="font-size:11px;color:#555;margin:4px 0">baseline 69 · target &lt;60</div>'+mkBar(Math.max(0,80-lrhr),25,"#f43f5e"):'<div style="font-size:12px;color:#333;font-style:italic">Upload sleep 😴</div>')+'</div><div class="card"><div class="lbl" style="color:#a78bfa">HRV</div>'+(lhrv?'<div style="font-size:21px;color:#a78bfa;font-family:monospace;font-weight:bold;line-height:1">'+lhrv+mkArrow(S.recLog,"avgHRV")+'<span style="font-size:11px;color:#555"> ms</span></div><div style="font-size:11px;color:#555;margin:4px 0">baseline 39 · higher = better</div>'+mkBar(lhrv,80,"#a78bfa"):'<div style="font-size:12px;color:#333;font-style:italic">Upload sleep 😴</div>')+'</div></div>';

  var trCard=tr?'<div class="card"><div class="lbl" style="color:#60a5fa">Today\'s Run</div><div style="display:flex;gap:14px;flex-wrap:wrap">'+[["Dist",tr.distance,"#fff"],["Pace",tr.pace,"#60a5fa"],["HR",tr.hr?tr.hr+"bpm":"--","#f43f5e"],["Cal",tr.calories?tr.calories+"kcal":"--","#fb923c"]].map(function(x){return '<div><div style="font-size:9px;color:#444;font-family:monospace">'+x[0]+'</div><div style="font-size:15px;color:'+x[2]+';font-family:monospace;font-weight:bold">'+(x[1]||"--")+'</div></div>';}).join("")+'</div></div>':"";

  return coachCard+alertCard+mkMissedRunCard()+remindCard+nextCard+weekCard+mkWeeklyReviewCard()+mkUpload()+snap+trCard+shoeWarn;
}

  return '<div style="padding-top:12px">'+weightCard+bodyCard+runCard+nutCard+'</div>';

// ── ANALYSIS TAB ──────────────────────────────────────────────────────────────
function mkAnalysis(){
  var W=320,PAD=28;

  // ── CHART HELPERS ──
  function lineChart(datasets,labels,h,yMin,yMax,yUnit,cfg){
    // datasets: [{vals, color, dashed}]
    // labels: x-axis date strings (sparse)
    var H=h||120;
    var maxLen=0;
    datasets.forEach(function(d){if(d.vals.length>maxLen)maxLen=d.vals.length;});
    if(maxLen<2)return '<div style="font-size:12px;color:#333;font-style:italic;padding:16px 0;text-align:center">Need 2+ entries to draw chart</div>';
    var lo=yMin!=null?yMin:Math.min.apply(null,datasets.reduce(function(a,d){return a.concat(d.vals.filter(function(v){return v!=null;}));},[]));
    var hi=yMax!=null?yMax:Math.max.apply(null,datasets.reduce(function(a,d){return a.concat(d.vals.filter(function(v){return v!=null;}));},[]));
    var range=hi-lo||1;
    var pad=PAD;
    var W2=W-pad;
    var H2=H-20;
    function px(i,len){return pad+(i/(len-1))*W2;}
    function py(v){return H2-(((v-lo)/range)*(H2-10))+4;}
    // Grid lines
    var gridCount=4;
    var grids="";
    for(var g=0;g<=gridCount;g++){
      var gv=lo+(range/gridCount)*g;
      var gy=py(gv);
      grids+='<line x1="'+pad+'" y1="'+gy+'" x2="'+W+'" y2="'+gy+'" stroke="#1e1e1e" stroke-width="1"/>';
      grids+='<text x="'+(pad-3)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="#444" font-family="monospace">'+gv.toFixed(1)+'</text>';
    }
    // Dataset lines + dots
    var lines="";
    datasets.forEach(function(ds){
      var pts=[];
      ds.vals.forEach(function(v,i){
        if(v!=null)pts.push(px(i,maxLen)+","+py(v));
      });
      if(pts.length>=2){
        var dash=ds.dashed?'stroke-dasharray="4 3"':"";
        lines+='<polyline points="'+pts.join(" ")+'" fill="none" stroke="'+ds.color+'" stroke-width="'+(ds.dashed?"1.5":"2")+'" stroke-linejoin="round" stroke-linecap="round" '+dash+'/>';
      }
      ds.vals.forEach(function(v,i){
        if(v!=null)lines+='<circle cx="'+px(i,maxLen)+'" cy="'+py(v)+'" r="3" fill="'+ds.color+'"/>';
      });
    });
    // X labels — show first, mid, last
    var xLabels="";
    if(labels&&labels.length){
      var idxs=[0,Math.floor((labels.length-1)/2),labels.length-1];
      idxs.forEach(function(idx){
        if(labels[idx])xLabels+='<text x="'+px(idx,maxLen)+'" y="'+(H)+'" text-anchor="middle" font-size="9" fill="#444" font-family="monospace">'+labels[idx]+'</text>';
      });
    }
    return '<svg width="100%" viewBox="0 0 '+W+' '+(H+4)+'" style="overflow:visible">'+grids+lines+xLabels+'</svg>';
  }

  function barChart(vals,labels,colors,h){
    var H=h||100;
    if(!vals||vals.length<1)return '<div style="font-size:12px;color:#333;font-style:italic;padding:16px 0;text-align:center">No data yet</div>';
    var lo=0,hi=Math.max.apply(null,vals.filter(function(v){return v!=null;}))||10;
    var pad=PAD,gap=2;
    var bw=(W-pad)/vals.length-gap;
    var H2=H-18;
    function py(v){return H2-(v/hi)*H2+4;}
    var bars=vals.map(function(v,i){
      if(v==null)return "";
      var x=pad+i*(bw+gap);
      var barH=(v/hi)*H2;
      var y=H2-barH+4;
      var c=colors?colors[i]:"#34d399";
      return '<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+barH+'" rx="2" fill="'+c+'"/>';
    }).join("");
    var xlbls="";
    if(labels){
      var step=Math.max(1,Math.floor(labels.length/5));
      labels.forEach(function(l,i){
        if(i%step===0||i===labels.length-1){
          var x=pad+i*(bw+gap)+bw/2;
          xlbls+='<text x="'+x+'" y="'+(H)+'" text-anchor="middle" font-size="9" fill="#444" font-family="monospace">'+l+'</text>';
        }
      });
    }
    // y axis labels
    var ylbls='<text x="'+(pad-3)+'" y="8" text-anchor="end" font-size="9" fill="#444" font-family="monospace">'+hi+'</text><text x="'+(pad-3)+'" y="'+(H2/2+4)+'" text-anchor="end" font-size="9" fill="#444" font-family="monospace">'+(hi/2).toFixed(0)+'</text>';
    return '<svg width="100%" viewBox="0 0 '+W+' '+(H+4)+'" style="overflow:visible">'+ylbls+bars+xlbls+'</svg>';
  }

  // ── YESTERDAY vs TODAY ──
  var today=toStr();
  var bLog=[].concat(S.bodyLog);
  var rLog=[].concat(S.recLog);
  var todayW=bLog.filter(function(e){return e.date===today;}).slice(-1)[0];
  var yestW=bLog.filter(function(e){return e.date!==today;}).slice(-1)[0];
  var todaySl=rLog.filter(function(e){return e.date===today&&e.totalHours;}).slice(-1)[0];
  var yestSl=rLog.filter(function(e){return e.date!==today&&e.totalHours;}).slice(-1)[0];

  function diffStr(cur,prev,field,unit,lo){
    if(cur==null||prev==null)return "";
    var d=(cur[field]-prev[field]);
    if(isNaN(d))return "";
    var good=lo?d<0:d>0;
    var str=(d>0?"+":"")+d.toFixed(1)+unit;
    return '<span style="color:'+(good?"#34d399":"#f43f5e")+';font-size:12px;font-family:monospace;margin-left:6px">'+str+'</span>';
  }

  var compareCard='<div class="card" style="margin-bottom:11px"><div class="lbl">Yesterday vs Today</div><div style="display:flex;gap:0">'
    +'<div style="flex:1;padding-right:10px;border-right:1px solid #1e1e1e">'
    +'<div style="font-size:10px;color:#555;margin-bottom:4px">Weight</div>'
    +(todayW?'<div style="font-size:18px;color:#fff;font-family:monospace;font-weight:bold">'+todayW.weight+'kg'+diffStr(todayW,yestW,"weight","kg",true)+'</div>'+'<div style="font-size:11px;color:#444;margin-top:2px">'+(yestW?"prev "+yestW.weight+"kg":"no prev entry")+'</div>':'<div style="font-size:12px;color:#333;font-style:italic">No entry today</div>')
    +'</div>'
    +'<div style="flex:1;padding-left:10px">'
    +'<div style="font-size:10px;color:#555;margin-bottom:4px">Sleep</div>'
    +(todaySl?'<div style="font-size:18px;color:#fff;font-family:monospace;font-weight:bold">'+todaySl.totalHours+'h'+diffStr(todaySl,yestSl,"totalHours","h",false)+'</div>'+'<div style="font-size:11px;color:#444;margin-top:2px">'+(yestSl?"prev "+yestSl.totalHours+"h":"no prev entry")+'</div>':'<div style="font-size:12px;color:#333;font-style:italic">No entry today</div>')
    +'</div>'
    +'</div></div>';

  // ── WEIGHT CHART ──
  var wEntries=[].concat(S.bodyLog).filter(function(e){return e.weight;});
  var wVals=wEntries.map(function(e){return e.weight;});
  var wDates=wEntries.map(function(e){return e.date;});
  // 7-day rolling average
  var wAvg=wVals.map(function(_,i){
    var window=wVals.slice(Math.max(0,i-6),i+1);
    return Math.round((window.reduce(function(a,v){return a+v;},0)/window.length)*10)/10;
  });
  var wMin=wVals.length?Math.min.apply(null,wVals)-1:100;
  var wMax=wVals.length?Math.max.apply(null,wVals)+1:116;
  var latestW=wVals.length?wVals[wVals.length-1]:null;
  var firstW=wVals.length?wVals[0]:null;
  var wDelta=latestW&&firstW?(latestW-firstW).toFixed(1):null;

  var weightChart='<div class="card" style="margin-bottom:11px">'
    +'<div class="lbl" style="color:#34d399">Weight Trend</div>'
    +(wDelta!==null?'<div style="display:flex;gap:12px;margin-bottom:10px;align-items:flex-end">'
      +'<div><div style="font-size:28px;color:#fff;font-family:monospace;font-weight:bold;line-height:1">'+latestW+'<span style="font-size:12px;color:#555">kg</span></div><div style="font-size:10px;color:#555;margin-top:2px">current</div></div>'
      +'<div><div style="font-size:18px;color:'+(parseFloat(wDelta)<=0?"#34d399":"#f43f5e")+';font-family:monospace;font-weight:bold">'+(parseFloat(wDelta)>0?"+":"")+wDelta+'kg</div><div style="font-size:10px;color:#555;margin-top:2px">since start</div></div>'
      +'<div style="margin-left:auto;text-align:right"><div style="font-size:12px;color:#555">102kg goal</div><div style="font-size:11px;color:#34d399;margin-top:2px">'+(latestW?(latestW-102).toFixed(1)+"kg to go":"--")+'</div></div>'
      +'</div>':"")
    +lineChart(
      [{vals:wVals,color:"#34d399",dashed:false},{vals:wAvg,color:"#34d39960",dashed:true}],
      wDates,130,wMin,wMax,"kg"
    )
    +(wEntries.length>=2?'<div style="font-size:10px;color:#444;margin-top:6px;display:flex;gap:14px"><span><span style="display:inline-block;width:12px;height:2px;background:#34d399;vertical-align:middle;margin-right:4px"></span>Daily</span><span><span style="display:inline-block;width:12px;height:2px;background:#34d39960;vertical-align:middle;margin-right:4px;border-top:2px dashed #34d39960"></span>7-day avg</span></div>':"")
    +'<div style="margin-top:10px">'
    +[].concat(S.bodyLog).filter(function(e){return e.weight;}).reverse().slice(0,8).map(function(e,i,a){
      var prev=a[i+1];
      var d=prev?(e.weight-prev.weight).toFixed(1):null;
      var good=d!=null&&parseFloat(d)<0;
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;'+(i<a.length-1?"border-bottom:1px solid #1a1a1a":"")+'"><span style="font-size:11px;color:#555;font-family:monospace">'+e.date+'</span><span style="font-size:13px;color:#fff;font-family:monospace">'+e.weight+'kg</span>'+(d!==null?'<span style="font-size:11px;font-family:monospace;color:'+(good?"#34d399":"#f43f5e")+'">'+(parseFloat(d)>0?"+":"")+d+'kg</span>':'<span></span>')+'</div>';
    }).join("")
    +'</div></div>';

  // ── SLEEP CHART ──
  var slEntries=[].concat(S.recLog).filter(function(e){return e.totalHours;});
  var slVals=slEntries.map(function(e){return e.totalHours;});
  var slDates=slEntries.map(function(e){return e.date;});
  var slColors=slVals.map(function(v){return v>=7?"#34d399":v>=5.5?"#fb923c":"#f43f5e";});
  var rhrVals=slEntries.map(function(e){return e.restingHR||null;});
  var hrvVals=slEntries.map(function(e){return e.avgHRV||null;});
  var avgSleep=slVals.length?(slVals.reduce(function(a,v){return a+v;},0)/slVals.length).toFixed(1):null;
  var goodNights=slVals.filter(function(v){return v>=7;}).length;

  var sleepChart='<div class="card" style="margin-bottom:11px">'
    +'<div class="lbl" style="color:#a78bfa">Sleep History</div>'
    +(avgSleep?'<div style="display:flex;gap:16px;margin-bottom:10px">'
      +'<div><div style="font-size:22px;color:#fff;font-family:monospace;font-weight:bold;line-height:1">'+avgSleep+'<span style="font-size:12px;color:#555">h avg</span></div><div style="font-size:10px;color:#555;margin-top:2px">all nights</div></div>'
      +'<div><div style="font-size:22px;color:#34d399;font-family:monospace;font-weight:bold;line-height:1">'+goodNights+'<span style="font-size:12px;color:#555">/'+slVals.length+'</span></div><div style="font-size:10px;color:#555;margin-top:2px">nights 7h+</div></div>'
      +'</div>':"")
    +(slVals.length>=1?barChart(slVals,slDates,slColors,100):'<div style="font-size:12px;color:#333;font-style:italic;padding:16px 0;text-align:center">No sleep data yet</div>')
    +'<div style="font-size:10px;color:#444;margin-top:6px;display:flex;gap:14px"><span style="color:#34d399">■ 7h+</span><span style="color:#fb923c">■ 5.5-7h</span><span style="color:#f43f5e">■ under 5.5h</span></div>'
    +(slEntries.length>=2?'<div style="margin-top:12px"><div style="font-size:9px;color:#a78bfa;font-family:monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">HRV Trend</div>'+lineChart([{vals:hrvVals,color:"#a78bfa",dashed:false}],slDates,80,null,null,"ms")+'</div>':"")
    +(slEntries.length>=2?'<div style="margin-top:12px"><div style="font-size:9px;color:#f43f5e;font-family:monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">Resting HR Trend</div>'+lineChart([{vals:rhrVals,color:"#f43f5e",dashed:false}],slDates,80,null,null,"bpm")+'</div>':"")
    +'<div style="margin-top:10px">'
    +slEntries.slice().reverse().slice(0,8).map(function(e,i,a){
      var prev=a[i+1];
      var dHrs=prev&&e.totalHours&&prev.totalHours?(e.totalHours-prev.totalHours).toFixed(1):null;
      var slCol=e.totalHours>=7?"#34d399":e.totalHours>=5.5?"#fb923c":"#f43f5e";
      return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;'+(i<a.length-1?"border-bottom:1px solid #1a1a1a":"")+'"><span style="font-size:11px;color:#555;font-family:monospace;min-width:52px">'+e.date+'</span><span style="font-size:13px;color:'+slCol+';font-family:monospace;font-weight:bold">'+(e.totalHours||"--")+'h</span>'+(e.restingHR?'<span style="font-size:11px;color:#f43f5e;font-family:monospace">'+e.restingHR+'bpm</span>':"")+(e.avgHRV?'<span style="font-size:11px;color:#a78bfa;font-family:monospace">HRV '+e.avgHRV+'</span>':"")+(e.bodyBatteryChange!=null?'<span style="font-size:11px;color:#34d399;font-family:monospace">'+(e.bodyBatteryChange>0?"+":"")+e.bodyBatteryChange+'</span>':"")+(dHrs!==null?'<span style="font-size:11px;color:'+(parseFloat(dHrs)>0?"#34d399":"#f43f5e")+';font-family:monospace;margin-left:auto">'+(parseFloat(dHrs)>0?"+":"")+dHrs+'h</span>':'')+'</div>';
    }).join("")
    +'</div></div>';

  // ── RUNNING CHART ──
  var rlEntries=[].concat(S.runLog).filter(function(e){return e.hr&&e.pace;});
  var rlDates=rlEntries.map(function(e){return e.date;});
  var hrVals=rlEntries.map(function(e){return e.hr;});
  // Convert pace "8:00/km" to decimal minutes
  var paceVals=rlEntries.map(function(e){
    if(!e.pace)return null;
    var p=e.pace.replace("/km","").trim();
    var parts=p.split(":");
    if(parts.length===2)return parseFloat(parts[0])+(parseFloat(parts[1])/60);
    return null;
  });
  var avgHRAll=hrVals.length?Math.round(hrVals.reduce(function(a,v){return a+v;},0)/hrVals.length):null;
  var latHR=hrVals.length?hrVals[hrVals.length-1]:null;
  var hrDelta=hrVals.length>=2?(hrVals[hrVals.length-1]-hrVals[0]):null;

  var runChart='<div class="card" style="margin-bottom:11px">'
    +'<div class="lbl" style="color:#60a5fa">Running Analysis</div>'
    +(avgHRAll?'<div style="display:flex;gap:16px;margin-bottom:10px">'
      +'<div><div style="font-size:22px;color:#f43f5e;font-family:monospace;font-weight:bold;line-height:1">'+avgHRAll+'<span style="font-size:12px;color:#555">bpm avg</span></div><div style="font-size:10px;color:#555;margin-top:2px">all runs</div></div>'
      +(hrDelta!==null?'<div><div style="font-size:22px;color:'+(hrDelta<=0?"#34d399":"#f43f5e")+';font-family:monospace;font-weight:bold;line-height:1">'+(hrDelta>0?"+":"")+hrDelta+'<span style="font-size:12px;color:#555">bpm</span></div><div style="font-size:10px;color:#555;margin-top:2px">HR change</div></div>':"")
      +'<div style="font-size:11px;color:#444;font-style:italic;margin-left:auto;max-width:100px;text-align:right">'+(hrDelta<=0?"HR trending down - fitness growing!":"HR trending up - keep easy days easy")+'</div>'
      +'</div>':"")
    +(rlEntries.length>=2?'<div style="margin-bottom:4px"><div style="font-size:9px;color:#f43f5e;font-family:monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">Heart Rate per Run</div>'+lineChart([{vals:hrVals,color:"#f43f5e",dashed:false}],rlDates,100,null,null,"bpm")+'</div>':'<div style="font-size:12px;color:#333;font-style:italic;padding:12px 0;text-align:center">Log 2+ runs with HR data to see trend</div>')
    +(paceVals.filter(function(v){return v;}).length>=2?'<div style="margin-top:12px"><div style="font-size:9px;color:#60a5fa;font-family:monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">Pace per Run (min/km)</div>'+lineChart([{vals:paceVals,color:"#60a5fa",dashed:false}],rlDates,80,null,null,"min/km")+'<div style="font-size:10px;color:#444;margin-top:4px;font-style:italic">Lower = faster. Watch this drop as fitness builds.</div></div>':"")
    +'<div style="margin-top:10px">'
    +rlEntries.slice().reverse().slice(0,8).map(function(r,i,a){
      var prev=a[i+1];
      var hrD=prev&&r.hr&&prev.hr?(r.hr-prev.hr):null;
      var vc=r.verdict==="on track"?"#34d399":r.verdict==="ahead"?"#60a5fa":"#f43f5e";
      return '<div style="display:flex;align-items:center;gap:7px;padding:5px 0;'+(i<a.length-1?"border-bottom:1px solid #1a1a1a":"")+'"><span style="font-size:11px;color:#555;font-family:monospace;min-width:52px">'+r.date+'</span>'+(r.distance?'<span style="font-size:11px;color:#fff;font-family:monospace">'+r.distance+'</span>':"")+(r.pace?'<span style="font-size:11px;color:#60a5fa;font-family:monospace">'+r.pace+'</span>':"")+(r.hr?'<span style="font-size:11px;color:#f43f5e;font-family:monospace">'+r.hr+'bpm'+(hrD!==null?'<span style="color:'+(hrD<=0?"#34d399":"#f43f5e")+'">'+(hrD>0?"+":"")+hrD+'</span>':"")+'</span>':"")+(r.verdict?'<span class="pill" style="background:'+vc+'15;border:1px solid '+vc+'30;color:'+vc+';font-size:9px;margin-left:auto">'+r.verdict+'</span>':"")+'</div>';
    }).join("")
    +'</div></div>';

  var emptyNote=(S.bodyLog.length===0&&S.recLog.length===0&&S.runLog.length===0)?
    '<div class="card" style="text-align:center;padding:24px"><div style="font-size:22px;margin-bottom:8px">📊</div><div style="font-size:13px;color:#555">Charts will appear here as you log data.<br>Upload screenshots daily to start building your trends.</div></div>':"";

  return '<div style="padding-top:12px">'+emptyNote+compareCard+weightChart+sleepChart+runChart+'</div>';
}
function mkPlan(){
  var raceCards='<div class="card" style="margin-bottom:11px"><div class="lbl">Race Calendar</div>'+RACE_LIST.map(function(r,i){
    var res=(S.races[i]||{}).result||"";
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;'+(i<RACE_LIST.length-1?"border-bottom:1px solid #181818":"")+'"><div style="width:18px;height:18px;border-radius:50%;flex-shrink:0;background:'+(res?"#34d39920":"transparent")+';border:2px solid '+(res?"#34d399":"#2a2a2a")+';display:flex;align-items:center;justify-content:center;font-size:8px;color:#34d399">'+(res?"✓":"")+'</div><div style="flex:1"><div style="font-size:13px;color:#ccc">'+r.label+'</div><div style="font-size:11px;color:#555">'+r.week+' · '+r.target+'</div>'+(res?'<div style="font-size:11px;color:#34d399;margin-top:2px">Result: '+res+'</div>':"")+'</div>'+(res?"":'<button onclick="document.getElementById(\'ri'+i+'_w\').style.display=\'block\';this.style.display=\'none\'" style="background:#34d39915;border:1px solid #34d39930;border-radius:6px;color:#34d399;font-size:10px;padding:3px 8px;font-family:monospace">Log</button>')+'</div><div id="ri'+i+'_w" style="display:none;padding:4px 0 8px 28px"><input id="ri'+i+'" class="inp" placeholder="Enter result..." style="margin-bottom:5px"/><button onclick="logRace('+i+')" style="background:#34d39920;border:1px solid #34d39940;border-radius:6px;color:#34d399;font-size:11px;padding:4px 12px;font-family:monospace">Save</button></div>';
  }).join("")+'</div>';

  var phaseHTML=phases.map(function(phase,pi){
    var pk=[];phase.ws.forEach(function(w,wi){w.runs.forEach(function(_,ri){pk.push("p"+pi+"w"+wi+"r"+ri);});});
    var pd=pk.filter(function(k){return S.comp[k];}).length;
    var isO=S.ep===pi;
    var weeks="";
    if(isO){weeks=phase.ws.map(function(week,wi){
      var wk=week.runs.map(function(_,ri){return "p"+pi+"w"+wi+"r"+ri;});
      var wd=wk.filter(function(k){return S.comp[k];}).length;
      var wc=wd===wk.length;
      var wid=pi+"-"+wi;
      var isWO=S.ew===wid;
      var runs="";
      if(isWO){
        // Collect days used in this week for conflict detection
        var usedDays={};
        week.runs.forEach(function(_,ri){var k="p"+pi+"w"+wi+"r"+ri;usedDays[getDay(k)]=(usedDays[getDay(k)]||0)+1;});
        runs=week.runs.map(function(run,ri){
          var key="p"+pi+"w"+wi+"r"+ri;
          var isDone=!!S.comp[key];
          var isSkipped=!!S.skipped[key];
          var feel=S.feels[key];
          var currentDay=getDay(key);
          var feelBtns=FO.map(function(f){var sel=feel===f.label;return '<button class="fbtn" onclick="setFeel(\''+key+'\',\''+f.label+'\')" style="border-color:'+(sel?f.c:"#1e1e1e")+';background:'+(sel?f.c+"20":"transparent")+';color:'+(sel?f.c:"#444")+'">'+f.i+" "+f.label+'</button>';}).join("");
          // Day cycle button - check if next day has conflict
          var nextIdx=(DAYS.indexOf(currentDay)+1)%DAYS.length;
          var nextDay=DAYS[nextIdx];
          var hasConflict=usedDays[nextDay]>0;
          var dayBtn='<button class="day-btn'+(hasConflict?" conflict":"")+'" onclick="cycleDay(\''+key+'\')" title="Tap to move run day'+(hasConflict?" (conflict: "+nextDay+" busy)":"")+'">'+currentDay+(hasConflict?" ⚠":"")+'</button>';
          var skipBtn='<button class="skip-btn'+(isSkipped?" skipped":"")+'" onclick="skipRun(\''+key+'\')">'+(isSkipped?"Skipped":"Skip")+'</button>';
          return '<div><div class="rrow" style="background:'+(isDone?"#0a120a":isSkipped?"#0a0a12":"transparent")+'"><button class="tick'+(isDone?" done":"")+'" onclick="manualTick(\''+key+'\')" style="'+(isDone?"background:"+phase.color+";border-color:"+phase.color:"border-color:"+(isSkipped?"#444":"#2a2a2a"))+'">'+( isDone?"✓":isSkipped?"–":"")+'</button>'+dayBtn+'<span class="pill" style="background:'+(isDone||isSkipped?"#ffffff08":TC[run.type]+"18")+';border:1px solid '+(isDone||isSkipped?"#222":TC[run.type]+"30")+';color:'+(isDone?"#555":isSkipped?"#444":TC[run.type])+';font-size:9px">'+run.type+'</span><div style="font-size:12px;color:'+(isDone?"#444":isSkipped?"#555":"#bbb")+';text-decoration:'+(isDone||isSkipped?"line-through":"none")+';flex:1">'+run.det+'</div>'+skipBtn+'</div>'+(isDone?'<div class="frow"><span style="font-size:9px;color:#333;font-family:monospace">FELT:</span>'+feelBtns+'</div>':"")+'</div>';
        }).join("");
      }
      return '<div style="border-bottom:'+(wi<phase.ws.length-1?"1px solid #181818":"none")+'"><button class="wbtn" onclick="toggleWeek(\''+wid+'\')"><div style="width:16px;height:16px;border-radius:50%;flex-shrink:0;background:'+(wc?phase.color:"transparent")+';border:2px solid '+(wc?phase.color:"#2a2a2a")+';display:flex;align-items:center;justify-content:center;font-size:8px;color:#000">'+(wc?"✓":"")+'</div><div style="font-size:12px;color:'+(week.rw?"#fb923c":wc?phase.color:"#aaa")+';font-family:monospace;flex:1">'+week.label+(week.cb?'<span style="font-size:9px;color:#444;margin-left:3px">↓</span>':"")+'</div><div style="width:70px">'+mkBar(week.km,68,phase.color)+'</div><div style="font-size:10px;color:#444;font-family:monospace;min-width:28px;text-align:right">'+week.km+'K</div><div style="color:#333;font-size:10px">'+(isWO?"▲":"▼")+'</div></button>'+runs+'</div>';
    }).join("");}
    return '<div style="margin-bottom:9px"><button class="pbtn'+(isO?" on":"")+'" onclick="togglePhase('+pi+')" style="'+(isO?"background:"+phase.bg+";border-color:"+phase.color+"40":"")+'"><div style="flex:1"><div style="font-size:9px;color:'+phase.color+';font-family:monospace;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px">Phase '+(pi+1)+' · Weeks '+phase.weeks+'</div><div style="font-size:15px;color:#fff;font-weight:normal">'+phase.name+'</div><div style="font-size:11px;color:#555;margin-top:1px">'+phase.goal+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:12px;color:'+phase.color+';font-family:monospace">'+pd+"/"+pk.length+'</div><div style="font-size:9px;color:#444">runs</div></div><div style="color:#333;font-size:11px">'+(isO?"▲":"▼")+'</div></button>'+(isO?'<div class="pbody">'+weeks+'</div>':"")+'</div>';
  }).join("");

  var paceCard='<div class="card" style="margin-bottom:11px"><div class="lbl">Pace Zones</div>'+PACES.map(function(p){return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #181818"><div><div style="font-size:12px;color:#aaa">'+p.l+'</div><div style="font-size:10px;color:#444">'+p.f+'</div></div><div style="font-size:14px;color:'+p.c+';font-family:monospace;font-weight:bold">'+p.p+'<span style="font-size:9px;color:#555">/km</span></div></div>';}).join("")+'</div>';

  var raceDay='<div class="card" style="background:#0d1a0d;border:1px solid #34d39918"><div class="lbl" style="color:#34d399">Race Day · 25 Oct 2026</div>'+[["0-10K","#34d399","Start at 6:00/km. Crowd energy lies. Ignore it."],["10-21K","#60a5fa","Settle to 5:41/km. Gel at 45 min."],["21-30K","#fb923c","NOT halfway mentally. Stay patient."],["30-37K","#f43f5e","The wall. Shorten stride. This is where it is won."],["37-42.2K","#c084fc","Empty the tank. O\'Connell Street is real."]].map(function(x){return '<div style="display:flex;gap:8px;margin-bottom:7px;align-items:flex-start"><span class="pill" style="background:'+x[1]+'18;border:1px solid '+x[1]+'40;color:'+x[1]+';white-space:nowrap">'+x[0]+'</span><div style="font-size:12px;color:#666;line-height:1.5;padding-top:2px">'+x[2]+'</div></div>';}).join("")+'</div>';

  return '<div style="padding-top:12px">'+raceCards+phaseHTML+paceCard+raceDay+'</div>';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  var d=done(),pct=Math.round((d/AK.length)*100);
  var keyBtn='<button onclick="toggleSettings()" style="background:'+(S.apiKey?"#34d39915":"#fb923c15")+';border:1px solid '+(S.apiKey?"#34d39930":"#fb923c40")+';border-radius:7px;color:'+(S.apiKey?"#34d399":"#fb923c")+';font-size:10px;padding:3px 9px;font-family:monospace;margin-bottom:3px">⚙ '+(S.apiKey?"AI ✓":"Set Key")+'</button>';
  var content="";
  if(S.tab==="today")content=mkToday();
  else if(S.tab==="progress")content=mkProgress();
  else if(S.tab==="recovery")content=mkRecovery();
  else if(S.tab==="analysis")content=mkAnalysis();
  else content=mkPlan();
  document.getElementById("app").innerHTML=
    mkSettings()+mkShoeModal()+mkManualModal()+mkExportModal()+mkConfirmMove()+
    '<div class="hdr"><div class="hdr-row"><div><div class="app-name">Marathon Coach</div><div class="app-title">Dublin 2026 · Paddy</div></div><div style="text-align:right">'+keyBtn+'<div class="days-num">'+dLeft()+'</div><div class="days-lbl">days to race</div></div></div><div><div class="prog-row"><span>Training progress</span><span style="color:#34d399">'+d+'/'+AK.length+' · '+pct+'%</span></div><div class="bar-track"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#34d399,#60a5fa,#fb923c,#c084fc);border-radius:99px;transition:width .5s"></div></div></div></div>'+
    '<div class="tabs"><button class="tab'+(S.tab==="today"?" on":"")+'" onclick="setTab(\'today\')">Today</button><button class="tab'+(S.tab==="progress"?" on":"")+'" onclick="setTab(\'progress\')">Progress</button><button class="tab'+(S.tab==="recovery"?" on":"")+'" onclick="setTab(\'recovery\')">Recovery</button><button class="tab'+(S.tab==="analysis"?" on":"")+'" onclick="setTab(\'analysis\')">Analysis</button><button class="tab'+(S.tab==="plan"?" on":"")+'" onclick="setTab(\'plan\')">Plan</button></div>'+
    '<div class="wrap" style="padding-top:12px">'+content+'</div>';
  var upz=document.getElementById("upz"),fi=document.getElementById("fi");
  if(upz&&fi){upz.onclick=function(){fi.click();};fi.value="";fi.onchange=function(e){if(e.target.files[0])handleFile(e.target.files[0]);};}
}
load();render();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("service-worker.js").catch(function (err) {
      console.warn("Service worker registration failed:", err);
    });
  });
}
</script>
